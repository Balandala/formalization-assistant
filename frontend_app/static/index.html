<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/styles.css">
  <title>DocAssistant</title>
</head>
<body class="p-4">

  <h3>DocAssistant</h3>

  <div class="container ">
     <div class="mb-3">
       <label for="fileInput" class="form-label">Выберите .docx файл</label>
       <input class="form-control" type="file" id="fileInput" accept=".docx">
     </div>

      <div class="mb-3">
       <label for="googleDocLink" class="form-label">Или вставьте ссылку на Google Docs</label>
       <input class="form-control" type="url" id="googleDocLink" placeholder="https://docs.google.com/document/d/...">
      </div>
    <button type="button" class="btn btn-primary" id="uploadBtn">Загрузить</button>

    <div class="mt-3" id="status"></div>
  </div>

  <script src="../scripts/main.js"></script>
</body>
</html>
