<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <title>DocAssistant</title>
</head>
<body class="p-4">
    <h3>DocAssistant</h3>

    <div class="container">

        <div class="mb-3">
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="mode" id="mode-upload" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="mode-upload">Загрузить документ</label>

                <input type="radio" class="btn-check" name="mode" id="mode-title" autocomplete="off">
                <label class="btn btn-outline-primary" for="mode-title">Только титульный лист</label>
            </div>
        </div>



        <div class="mb-3" id="upload-container">
            <div class="drop-zone" id="dropZone">
                <p id="dropZoneText">Перетащите сюда файл .docx или кликните, чтобы выбрать</p>
                <i class="bi bi-cloud-upload display-4 text-primary"></i>
            </div>
            <input type="file" id="fileInput" accept=".docx" style="display: none;">

            <div class="mb-3" id="addTitleCheckbox" style="display: none;">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="includeTitle">
                    <label class="form-check-label" for="includeTitle">
                        Добавить титульный лист к документу
                    </label>
                </div>
            </div>
        </div>

        <form id="titleForm" style="display: none;" class="mt-3 p-3 border rounded bg-light">
        <h6>Введите данные для титульного листа</h6>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Институт</label>
                    <input type="text" class="form-control" id="institute" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Тип работы</label>
                    <input type="text" class="form-control" id="work_type" value="Курсовая работа" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Дисциплина</label>
                    <input type="text" class="form-control" id="subject" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Тема</label>
                    <input type="text" class="form-control" id="theme" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Автор</label>
                    <input type="text" class="form-control" id="author" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Группа</label>
                    <input type="text" class="form-control" id="group" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Руководитель</label>
                    <input type="text" class="form-control" id="chief" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Должность</label>
                    <input type="text" class="form-control" id="post" value="Преподаватель" required>
                </div>
            </div>
        </form>


        <div class="mt-3" id="status"></div>
    </div>

    <script src="../scripts/main.js"></script>
</body>
</html>
